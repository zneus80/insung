# Google Cloud Build — Cloud Run 자동 배포
# NEXT_PUBLIC_* 변수는 .env.production 파일에 포함되어 있어 별도 설정 불필요
# FIREBASE_SERVICE_ACCOUNT_KEY 만 Secret Manager에 등록하면 됨

substitutions:
  _REGION: asia-northeast3
  _SERVICE_NAME: insung-pms
  _REPO_NAME: cloud-run-source-deploy
  _IMAGE: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}

steps:
  # 1. Docker 이미지 빌드 (.env.production이 repo에 포함되어 자동으로 읽힘)
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - '-t'
      - '${_IMAGE}:$SHORT_SHA'
      - '-t'
      - '${_IMAGE}:latest'
      - '-f'
      - 'pms-app/Dockerfile'
      - 'pms-app/'

  # 2. Artifact Registry에 이미지 푸시
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - '--all-tags'
      - '${_IMAGE}'
    waitFor: [build]

  # 3. Cloud Run에 배포 (FIREBASE_SERVICE_ACCOUNT_KEY는 런타임 시크릿으로 주입)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE_NAME}'
      - '--image=${_IMAGE}:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--update-secrets=FIREBASE_SERVICE_ACCOUNT_KEY=FIREBASE_SERVICE_ACCOUNT_KEY:latest'
    waitFor: [push]

images:
  - '${_IMAGE}:$SHORT_SHA'
  - '${_IMAGE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
